defaults:
  browserName: chromium
  headless: true
  viewport: { width: 1920, height: 1080 }

# LambdaTest grid profiles for utils/lambdaGrid.ts.
#
# Select a profile with GRID_PROFILE=<name>; falls back to grid.defaultProfile
# below if unset. Any LAMBDA_*/IS_GRID env var (e.g. set via cross-env in
# package.json scripts) still overrides the value from the active profile,
# so existing scripts keep working unchanged.
#
# Secrets (LAMBDA_USER/LAMBDA_KEY) stay in .env — never put them here.
grid:
  defaultProfile: local

  profiles:
    local:
      isGrid: false

    windows-chrome:
      isGrid: true
      realDevice: false
      platform: "Windows 10"
      resolution: "1920x1080"

    windows-firefox:
      isGrid: true
      realDevice: false
      platform: "Windows 10"
      resolution: "1920x1080"

    macos-webkit:
      isGrid: true
      realDevice: false
      platform: "macOS Sonoma"
      resolution: "1920x1080"

    android-real:
      isGrid: true
      realDevice: true
      realDeviceOptions:
        platformName: android
        deviceName: ".*"
        platformVersion: ".*"

