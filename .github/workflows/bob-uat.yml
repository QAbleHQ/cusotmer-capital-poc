name: BOB UAT Tests

on:
  push:
    branches:
      - email-setup

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run BOB UAT tests
        id: run-tests
        continue-on-error: true
        run: |
          set +e
          npm run test:bob:uat
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Generate email summary
        if: always()
        run: node .github/scripts/generate-report-summary.js reports/test-results.json reports/email-summary.txt

      - name: Publish Playwright report to job summary
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const reportPath = 'reports/test-results.json';
          if (!fs.existsSync(reportPath)) {
            console.log('No test-results.json found, skipping summary.');
            process.exit(0);
          }

          const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));

          let total = 0, passed = 0, failed = 0, skipped = 0, flaky = 0, durationMs = 0;
          const failures = [];

          function collect(suite) {
            for (const spec of suite.specs || []) {
              for (const test of spec.tests || []) {
                total++;
                const result = test.results?.[test.results.length - 1];
                const status = result?.status || 'unknown';
                durationMs += result?.duration || 0;
                if (status === 'passed') passed++;
                else if (status === 'failed' || status === 'timedOut') {
                  failed++;
                  const msg = (result?.error?.message || 'No error').split('\n')[0].replace(/\x1B\[[0-9;]*m/g, '');
                  failures.push({ title: spec.title + ' › ' + test.title, file: spec.file || '', msg });
                } else if (status === 'skipped') skipped++;
                else if (status === 'flaky') flaky++;
              }
            }
            for (const child of suite.suites || []) collect(child);
          }

          for (const suite of report.suites || []) collect(suite);

          const s = Math.round(durationMs / 1000);
          const duration = s < 60 ? s + 's' : Math.floor(s/60) + 'm ' + (s%60) + 's';
          const status = failed > 0 ? '❌ FAILED' : '✅ PASSED';
          const badge = failed > 0 ? '🔴' : '🟢';

          let md = '';
          md += '## ' + badge + ' Playwright Report — BOB UAT\n\n';
          md += '| | |\n|---|---|\n';
          md += '| **Status** | ' + status + ' |\n';
          md += '| **Total** | ' + total + ' |\n';
          md += '| **Passed** | ✅ ' + passed + ' |\n';
          md += '| **Failed** | ' + (failed > 0 ? '❌ ' + failed : '0') + ' |\n';
          md += '| **Skipped** | ⏭️ ' + skipped + ' |\n';
          md += '| **Flaky** | ⚠️ ' + flaky + ' |\n';
          md += '| **Duration** | ⏱️ ' + duration + ' |\n';
          md += '| **Branch** | \`' + (process.env.GITHUB_REF_NAME || '') + '\` |\n';
          md += '| **Triggered by** | ' + (process.env.GITHUB_ACTOR || '') + ' |\n';
          md += '| **Commit** | \`' + (process.env.GITHUB_SHA || '').substring(0, 7) + '\` |\n\n';

          if (failures.length > 0) {
            md += '### ❌ Failed Tests\n\n';
            md += '| # | Test | Error |\n|---|---|---|\n';
            failures.slice(0, 20).forEach((f, i) => {
              md += '| ' + (i+1) + ' | ' + f.title.replace(/\|/g, '\\|') + ' | ' + f.msg.substring(0, 120).replace(/\|/g, '\\|') + ' |\n';
            });
            md += '\n';
          } else {
            md += '### ✅ All tests passed\n\n';
          }

          md += '---\n';
          md += '> 📦 Full HTML report available as artifact: \`playwright-report-BOB-UAT-' + process.env.GITHUB_RUN_ID + '\`\n';

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md);
          console.log('Job summary written.');
          "

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-BOB-UAT-${{ github.run_id }}
          path: |
            playwright-report/
            reports/test-results.json
            reports/email-summary.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failures-BOB-UAT-${{ github.run_id }}
          path: test-results/
          retention-days: 30
          if-no-files-found: ignore

      - name: Ensure playwright-report exists
        if: always()
        run: |
          if [ ! -f "playwright-report/index.html" ]; then
            mkdir -p playwright-report
            echo "<html><body><h2>No report generated for run ${{ github.run_id }}</h2></body></html>" > playwright-report/index.html
          fi

      - name: Deploy report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: reports/${{ github.run_id }}
          keep_files: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com

      - name: Set report URL
        if: always()
        id: report-url
        run: |
          REPO="${{ github.repository }}"
          ORG=$(echo "$REPO" | cut -d'/' -f1)
          REPO_NAME=$(echo "$REPO" | cut -d'/' -f2)
          URL="https://${ORG}.github.io/${REPO_NAME}/reports/${{ github.run_id }}/index.html"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "### 📊 [View Playwright Report]($URL)" >> "$GITHUB_STEP_SUMMARY"

      - name: Send email report
        if: always()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.office365.com
          server_port: 587
          username: ankitpatel@qable.io
          password: zjwtgkflbwczqrpb
          subject: "[${{ steps.run-tests.outputs.exit_code == '0' && 'PASSED' || 'FAILED' }}] BOB UAT — Playwright Report"
          to: aneri.patel@qable.io, nikunj.trivedi@qable.io, 1ee687f3.linearloop.io@in.teams.ms
          from: ankitpatel@qable.io
          body: file://reports/email-summary.txt
          html_body: |
            <h2>Playwright Test Report — BOB UAT</h2>
            <p><strong>Status:</strong> ${{ steps.run-tests.outputs.exit_code == '0' && 'PASSED ✅' || 'FAILED ❌' }}</p>
            <p><strong>Branch:</strong> ${{ github.ref_name }}</p>
            <p><strong>Triggered by:</strong> ${{ github.actor }}</p>
            <p><strong>Commit:</strong> ${{ github.sha }}</p>
            <p><strong>Date (UTC):</strong> ${{ github.event.head_commit.timestamp }}</p>
            <p><strong>Workflow Run:</strong> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Run</a></p>
            <p><strong>Playwright Report:</strong> <a href="${{ steps.report-url.outputs.url }}">👉 Open Report</a></p>

      - name: Fail job if tests failed
        if: steps.run-tests.outputs.exit_code != '0'
        run: exit 1
