name: UAT Tests

run-name: ${{ github.event.inputs.client || 'BOB' }} UAT Tests

# Triggers:
#   1. push     → auto run  on every push to main (BOB UAT)
#   2. schedule → daily at 2:00 AM IST (BOB UAT)
#   3. workflow_dispatch → manual run with client / environment / feature options

on:
  push:
    branches: [main]

  schedule:
    # 2:00 AM IST = 20:30 UTC (previous calendar day)
    - cron: "30 20 * * *"

  workflow_dispatch:
    inputs:
      client:
        description: "Client name (BOB, IDFC)"
        required: true
        type: choice
        options: [BOB, IDFC]
        default: BOB
      environment:
        description: "Environment (QA, UAT, PROD)"
        required: true
        type: choice
        options: [QA, UAT, PROD]
        default: UAT
      feature:
        description: "Optional feature tag without @ (e.g. Loginpage, Homepage)"
        required: false
        default: ""

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      feature: ${{ steps.set-matrix.outputs.feature }}
      trigger: ${{ steps.set-matrix.outputs.trigger }}
    steps:
      - name: Build test matrix
        id: set-matrix
        run: |
          FEATURE="${{ github.event.inputs.feature }}"
          TRIGGER="${{ github.event_name }}"

          if [ "$TRIGGER" = "workflow_dispatch" ]; then
            MATRIX=$(jq -nc \
              --arg client "${{ github.event.inputs.client }}" \
              --arg environment "${{ github.event.inputs.environment }}" \
              '{include:[{client:$client,environment:$environment}]}')
          elif [ "$TRIGGER" = "schedule" ]; then
            MATRIX='{"include":[{"client":"BOB","environment":"UAT"}]}'
          else
            # push to main — BOB UAT only
            MATRIX='{"include":[{"client":"BOB","environment":"UAT"}]}'
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "feature=$FEATURE" >> "$GITHUB_OUTPUT"
          echo "trigger=$TRIGGER" >> "$GITHUB_OUTPUT"

  test:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CI: true
      PROJECT: ${{ matrix.client }}-chrome-${{ matrix.environment }}
      FEATURE_TAG: ${{ needs.prepare.outputs.feature }}
      RUN_TRIGGER: ${{ needs.prepare.outputs.trigger }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: run-tests
        continue-on-error: true
        run: |
          GREP_ARG=""
          if [ -n "$FEATURE_TAG" ]; then
            GREP_ARG="--grep @${FEATURE_TAG}"
          else
            GREP_ARG="--grep @${{ matrix.client }}"
          fi

          echo "Trigger=$RUN_TRIGGER | PROJECT=$PROJECT $GREP_ARG"
          set +e
          npx playwright test \
            --config=playwright.config.ts \
            $GREP_ARG \
            --workers=4 \
            --retries=2
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Generate email summary
        if: always()
        run: node .github/scripts/generate-report-summary.js reports/test-results.json reports/email-summary.txt

      - name: Calculate test stats
        if: always()
        id: stats
        run: |
          node -e "
          const fs = require('fs');
          const reportPath = 'reports/test-results.json';
          let total = 0, passed = 0, failed = 0, skipped = 0, flaky = 0, durationMs = 0;
          const failures = [];

          if (fs.existsSync(reportPath)) {
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            function collect(suite) {
              for (const spec of suite.specs || []) {
                for (const test of spec.tests || []) {
                  total++;
                  const result = test.results?.[test.results.length - 1];
                  const status = result?.status || 'unknown';
                  durationMs += result?.duration || 0;
                  if (status === 'passed') passed++;
                  else if (status === 'failed' || status === 'timedOut') {
                    failed++;
                    const msg = (result?.error?.message || 'No error').split('\n')[0].replace(/\x1B\[[0-9;]*m/g, '');
                    failures.push(spec.title + ' > ' + test.title + ': ' + msg.substring(0, 100));
                  } else if (status === 'skipped') skipped++;
                  else if (status === 'flaky') flaky++;
                }
              }
              for (const child of suite.suites || []) collect(child);
            }
            for (const suite of report.suites || []) collect(suite);
          }

          const s = Math.round(durationMs / 1000);
          const duration = s < 60 ? s + 's' : Math.floor(s/60) + 'm ' + (s%60) + 's';
          const out = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(out, 'total=' + total + '\n');
          fs.appendFileSync(out, 'passed=' + passed + '\n');
          fs.appendFileSync(out, 'failed=' + failed + '\n');
          fs.appendFileSync(out, 'skipped=' + skipped + '\n');
          fs.appendFileSync(out, 'flaky=' + flaky + '\n');
          fs.appendFileSync(out, 'duration=' + duration + '\n');
          fs.appendFileSync(out, 'status=' + (failed > 0 ? 'FAILED' : 'PASSED') + '\n');
          fs.appendFileSync(out, 'failures_text=' + failures.slice(0,10).join(' | ') + '\n');
          console.log('Stats written:', { total, passed, failed, skipped, flaky, duration });
          "

      - name: Publish Playwright report to job summary
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          const reportPath = 'reports/test-results.json';
          if (!fs.existsSync(reportPath)) { process.exit(0); }

          const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
          let total = 0, passed = 0, failed = 0, skipped = 0, flaky = 0, durationMs = 0;
          const failures = [];

          function collect(suite) {
            for (const spec of suite.specs || []) {
              for (const test of spec.tests || []) {
                total++;
                const result = test.results?.[test.results.length - 1];
                const status = result?.status || 'unknown';
                durationMs += result?.duration || 0;
                if (status === 'passed') passed++;
                else if (status === 'failed' || status === 'timedOut') {
                  failed++;
                  const msg = (result?.error?.message || 'No error').split('\n')[0].replace(/\x1B\[[0-9;]*m/g, '');
                  failures.push({ title: spec.title + ' › ' + test.title, msg });
                } else if (status === 'skipped') skipped++;
                else if (status === 'flaky') flaky++;
              }
            }
            for (const child of suite.suites || []) collect(child);
          }
          for (const suite of report.suites || []) collect(suite);

          const s = Math.round(durationMs / 1000);
          const duration = s < 60 ? s + 's' : Math.floor(s/60) + 'm ' + (s%60) + 's';
          const status = failed > 0 ? '❌ FAILED' : '✅ PASSED';
          const badge = failed > 0 ? '🔴' : '🟢';

          let md = '## ' + badge + ' Playwright Report — ${{ matrix.client }} ${{ matrix.environment }}\n\n';
          md += '| | |\n|---|---|\n';
          md += '| **Status** | ' + status + ' |\n';
          md += '| **Total** | ' + total + ' |\n';
          md += '| **Passed** | ✅ ' + passed + ' |\n';
          md += '| **Failed** | ' + (failed > 0 ? '❌ ' + failed : '0') + ' |\n';
          md += '| **Skipped** | ⏭️ ' + skipped + ' |\n';
          md += '| **Flaky** | ⚠️ ' + flaky + ' |\n';
          md += '| **Duration** | ⏱️ ' + duration + ' |\n';
          md += '| **Branch** | \`' + (process.env.GITHUB_REF_NAME || '') + '\` |\n';
          md += '| **Triggered by** | ' + (process.env.GITHUB_ACTOR || '') + ' |\n';
          md += '| **Commit** | \`' + (process.env.GITHUB_SHA || '').substring(0, 7) + '\` |\n\n';

          if (failures.length > 0) {
            md += '### ❌ Failed Tests\n\n| # | Test | Error |\n|---|---|---|\n';
            failures.slice(0, 20).forEach((f, i) => {
              md += '| ' + (i+1) + ' | ' + f.title.replace(/\|/g, '\\|') + ' | ' + f.msg.substring(0, 120).replace(/\|/g, '\\|') + ' |\n';
            });
            md += '\n';
          } else {
            md += '### ✅ All tests passed\n\n';
          }

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md);
          console.log('Job summary written.');
          "

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.client }}-${{ matrix.environment }}-${{ github.run_id }}
          path: |
            playwright-report/
            reports/test-results.json
            reports/email-summary.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Upload failure artifacts
        if: failure() || steps.run-tests.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failures-${{ matrix.client }}-${{ matrix.environment }}-${{ github.run_id }}
          path: test-results/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload report to S3 (optional)
        if: always() && vars.ENABLE_S3_REPORT_UPLOAD == 'true'
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_REPORT_BUCKET: ${{ secrets.S3_REPORT_BUCKET }}
        run: |
          if [ -z "$S3_REPORT_BUCKET" ]; then
            echo "S3 bucket not configured. Skipping."
            exit 0
          fi
          REPORT_KEY="playwright-reports/${{ github.repository }}/${{ github.run_id }}/${{ matrix.client }}-${{ matrix.environment }}.zip"
          zip -r report.zip playwright-report reports/test-results.json reports/email-summary.txt
          aws s3 cp report.zip "s3://${S3_REPORT_BUCKET}/${REPORT_KEY}"

      - name: Ensure playwright-report exists
        if: always()
        run: |
          ls -la playwright-report/ || true
          if [ ! -f "playwright-report/index.html" ]; then
            mkdir -p playwright-report
            echo "<html><body><h2>No report generated for run ${{ github.run_id }}</h2></body></html>" > playwright-report/index.html
          fi

      - name: Deploy report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: bob/${{ matrix.client }}-${{ matrix.environment }}
          keep_files: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com

      - name: Set report URL
        if: always()
        id: report-url
        run: |
          REPO="${{ github.repository }}"
          ORG=$(echo "$REPO" | cut -d'/' -f1)
          REPO_NAME=$(echo "$REPO" | cut -d'/' -f2)
          URL="https://${ORG}.github.io/${REPO_NAME}/bob/${{ matrix.client }}-${{ matrix.environment }}/"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "### 📊 [View Playwright Report]($URL)" >> "$GITHUB_STEP_SUMMARY"

      - name: Send email report
        if: always()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.office365.com
          server_port: 587
          username: ankitpatel@qable.io
          password: zjwtgkflbwczqrpb
          subject: "[${{ steps.stats.outputs.status }}] ${{ matrix.client }} ${{ matrix.environment }} [Chrome/Web] — Playwright Report"
          to: aneri.patel@qable.io, nikunj.trivedi@qable.io, 1ee687f3.linearloop.io@in.teams.ms
          from: ankitpatel@qable.io
          html_body: |
            <div style="font-family:Arial,sans-serif;max-width:600px;margin:auto">
              <h2 style="background:${{ steps.stats.outputs.status == 'FAILED' && '#cc0000' || '#00b300' }};color:#fff;padding:12px 16px;border-radius:4px;margin:0 0 0 0">
                ${{ steps.stats.outputs.status == 'FAILED' && '🔴' || '🟢' }} Playwright Report — ${{ matrix.client }} ${{ matrix.environment }} [Chrome/Web]
              </h2>
              <table width="100%" cellpadding="8" cellspacing="0" style="border-collapse:collapse;margin-top:0;border:1px solid #ddd">
                <tr><td style="background:#f5f5f5;font-weight:bold;width:140px">Status</td><td>${{ steps.stats.outputs.status == 'FAILED' && '❌ FAILED' || '✅ PASSED' }}</td></tr>
                <tr><td style="font-weight:bold">Total</td><td>${{ steps.stats.outputs.total }}</td></tr>
                <tr style="background:#f5f5f5"><td style="font-weight:bold">Passed</td><td>✅ ${{ steps.stats.outputs.passed }}</td></tr>
                <tr><td style="font-weight:bold">Failed</td><td>❌ ${{ steps.stats.outputs.failed }}</td></tr>
                <tr style="background:#f5f5f5"><td style="font-weight:bold">Skipped</td><td>⏭️ ${{ steps.stats.outputs.skipped }}</td></tr>
                <tr><td style="font-weight:bold">Flaky</td><td>⚠️ ${{ steps.stats.outputs.flaky }}</td></tr>
                <tr style="background:#f5f5f5"><td style="font-weight:bold">Duration</td><td>⏱️ ${{ steps.stats.outputs.duration }}</td></tr>
                <tr><td style="font-weight:bold">Trigger</td><td>${{ needs.prepare.outputs.trigger }}</td></tr>
                <tr style="background:#f5f5f5"><td style="font-weight:bold">Branch</td><td>${{ github.ref_name }}</td></tr>
                <tr><td style="font-weight:bold">Triggered by</td><td>${{ github.actor }}</td></tr>
                <tr style="background:#f5f5f5"><td style="font-weight:bold">Commit</td><td>${{ github.sha }}</td></tr>
              </table>
              <p style="margin-top:16px">
                <a href="${{ steps.report-url.outputs.url }}" style="background:#0066cc;color:#fff;padding:10px 18px;border-radius:4px;text-decoration:none;font-weight:bold">📊 View Playwright Report</a>
                &nbsp;
                <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="background:#555;color:#fff;padding:10px 18px;border-radius:4px;text-decoration:none;font-weight:bold">🔗 View Run</a>
              </p>
            </div>

      - name: Notify MS Teams
        if: always()
        continue-on-error: true
        run: |
          STATUS="${{ steps.stats.outputs.status }}"
          COLOR="${{ steps.stats.outputs.status == 'FAILED' && 'cc0000' || '00b300' }}"
          EMOJI="${{ steps.stats.outputs.status == 'FAILED' && '🔴' || '🟢' }}"
          curl -s -X POST "${{ secrets.MS_TEAMS_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"type\": \"message\",
              \"attachments\": [{
                \"contentType\": \"application/vnd.microsoft.card.adaptive\",
                \"content\": {
                  \"\$schema\": \"http://adaptivecards.io/schemas/adaptive-card.json\",
                  \"type\": \"AdaptiveCard\",
                  \"version\": \"1.4\",
                  \"body\": [
                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"${EMOJI} Playwright Report — ${{ matrix.client }} ${{ matrix.environment }} — ${STATUS}\",
                      \"weight\": \"Bolder\",
                      \"size\": \"Medium\",
                      \"wrap\": true
                    },
                    {
                      \"type\": \"FactSet\",
                      \"facts\": [
                        { \"title\": \"Status\",       \"value\": \"${STATUS}\" },
                        { \"title\": \"Total\",        \"value\": \"${{ steps.stats.outputs.total }}\" },
                        { \"title\": \"Passed\",       \"value\": \"✅ ${{ steps.stats.outputs.passed }}\" },
                        { \"title\": \"Failed\",       \"value\": \"❌ ${{ steps.stats.outputs.failed }}\" },
                        { \"title\": \"Skipped\",      \"value\": \"⏭️ ${{ steps.stats.outputs.skipped }}\" },
                        { \"title\": \"Flaky\",        \"value\": \"⚠️ ${{ steps.stats.outputs.flaky }}\" },
                        { \"title\": \"Duration\",     \"value\": \"⏱️ ${{ steps.stats.outputs.duration }}\" },
                        { \"title\": \"Trigger\",      \"value\": \"${{ needs.prepare.outputs.trigger }}\" },
                        { \"title\": \"Branch\",       \"value\": \"${{ github.ref_name }}\" },
                        { \"title\": \"Triggered by\", \"value\": \"${{ github.actor }}\" },
                        { \"title\": \"Commit\",       \"value\": \"${{ github.sha }}\" }
                      ]
                    }
                  ],
                  \"actions\": [
                    {
                      \"type\": \"Action.OpenUrl\",
                      \"title\": \"📊 View Playwright Report\",
                      \"url\": \"${{ steps.report-url.outputs.url }}\"
                    },
                    {
                      \"type\": \"Action.OpenUrl\",
                      \"title\": \"🔗 View Run\",
                      \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                    }
                  ]
                }
              }]
            }"

            
      - name: Fail job when tests failed
        if: steps.run-tests.outputs.exit_code != '0'
        run: exit 1
