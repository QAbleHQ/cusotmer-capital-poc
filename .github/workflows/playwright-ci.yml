name: Playwright Automation Framework CI

# Triggers:
#   1. push      → auto run on every push to main (BOB-QA + IDFC-QA)
#   2. schedule  → daily at 2:00 AM IST (all clients × QA/UAT/PROD)
#   3. workflow_dispatch → manual run with client / environment / feature options
#
# Email (disabled until client provides SMTP credentials):
#   Secrets: SMTP_USER, SMTP_PASS, SMTP_FROM
#   Recipients: aneri.patel@qable.io, nikunj.trivedi@qable.io
#   Uncomment "Send email report" step below when ready.

on:
  push:
    branches: [main, stage]

  schedule:
    # 2:00 AM IST = 20:30 UTC (previous calendar day)
    - cron: "30 20 * * *"

  workflow_dispatch:
    inputs:
      client:
        description: "Client name (BOB, IDFC)"
        required: true
        type: choice
        options: [BOB, IDFC]
        default: BOB
      environment:
        description: "Environment (QA, UAT, PROD)"
        required: true
        type: choice
        options: [QA, UAT, PROD]
        default: QA
      feature:
        description: "Optional feature tag without @ (e.g. Loginpage, Homepage)"
        required: false
        default: ""

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      feature: ${{ steps.set-matrix.outputs.feature }}
      trigger: ${{ steps.set-matrix.outputs.trigger }}
    steps:
      - name: Build test matrix
        id: set-matrix
        run: |
          FEATURE="${{ github.event.inputs.feature }}"
          TRIGGER="${{ github.event_name }}"

          if [ "$TRIGGER" = "workflow_dispatch" ]; then
            MATRIX=$(jq -nc \
              --arg client "${{ github.event.inputs.client }}" \
              --arg environment "${{ github.event.inputs.environment }}" \
              '{include:[{client:$client,environment:$environment}]}')
          elif [ "$TRIGGER" = "schedule" ]; then
            # 2:00 AM IST — BOB UAT only
            MATRIX='{"include":[
              {"client":"BOB","environment":"UAT"}
            ]}'
          else
            # push to main — BOB UAT only
            MATRIX='{"include":[
              {"client":"BOB","environment":"UAT"}
            ]}'
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "feature=$FEATURE" >> "$GITHUB_OUTPUT"
          echo "trigger=$TRIGGER" >> "$GITHUB_OUTPUT"

  test:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    runs-on: ubuntu-latest
    env:
      CI: true
      PROJECT: ${{ matrix.client }}-chrome-${{ matrix.environment }}
      FEATURE_TAG: ${{ needs.prepare.outputs.feature }}
      RUN_TRIGGER: ${{ needs.prepare.outputs.trigger }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: run-tests
        continue-on-error: true
        run: |
          GREP_ARG=""
          if [ -n "$FEATURE_TAG" ]; then
            GREP_ARG="--grep @${FEATURE_TAG}"
          else
            GREP_ARG="--grep @${{ matrix.client }}"
          fi

          echo "Trigger=$RUN_TRIGGER | PROJECT=$PROJECT $GREP_ARG"
          set +e
          npx playwright test \
            --config=playwright.config.ts \
            $GREP_ARG \
            --workers=4 \
            --retries=2
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Generate email summary
        if: always()
        run: node .github/scripts/generate-report-summary.js reports/test-results.json reports/email-summary.txt

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.client }}-${{ matrix.environment }}-${{ github.run_id }}
          path: |
            playwright-report/
            reports/test-results.json
            reports/email-summary.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Upload failure artifacts
        if: failure() || steps.run-tests.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failures-${{ matrix.client }}-${{ matrix.environment }}-${{ github.run_id }}
          path: test-results/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload report to S3 (optional)
        if: always() && vars.ENABLE_S3_REPORT_UPLOAD == 'true'
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_REPORT_BUCKET: ${{ secrets.S3_REPORT_BUCKET }}
        run: |
          if [ -z "$S3_REPORT_BUCKET" ]; then
            echo "S3 bucket secret not configured. Skipping S3 upload."
            exit 0
          fi

          REPORT_KEY="playwright-reports/${{ github.repository }}/${{ github.run_id }}/${{ matrix.client }}-${{ matrix.environment }}.zip"
          zip -r report.zip playwright-report reports/test-results.json reports/email-summary.txt
          aws s3 cp report.zip "s3://${S3_REPORT_BUCKET}/${REPORT_KEY}"
          echo "S3_REPORT_URL=https://${S3_REPORT_BUCKET}.s3.${AWS_REGION}.amazonaws.com/${REPORT_KEY}" >> "$GITHUB_ENV"

      # --- Email disabled until client provides SMTP credentials ---
      # - name: Send email report
      #   if: always()
      #   continue-on-error: true
      #   uses: dawidd6/action-send-mail@v3
      #   with:
      #     server_address: smtp.office365.com
      #     server_port: 587
      #     username: ${{ secrets.SMTP_USER }}
      #     password: ${{ secrets.SMTP_PASS }}
      #     subject: "[${{ steps.run-tests.outputs.exit_code == '0' && 'PASSED' || 'FAILED' }}] Playwright - ${{ matrix.client }} - ${{ matrix.environment }} (${{ env.RUN_TRIGGER }})"
      #     to: aneri.patel@qable.io, nikunj.trivedi@qable.io
      #     from: ${{ secrets.SMTP_FROM }}
      #     body: file://reports/email-summary.txt
      #     html_body: |
      #       <h2>Playwright Test Report</h2>
      #       <p><strong>Trigger:</strong> ${{ env.RUN_TRIGGER }}</p>
      #       <p><strong>Client:</strong> ${{ matrix.client }}</p>
      #       <p><strong>Environment:</strong> ${{ matrix.environment }}</p>
      #       <p><strong>Feature Tag:</strong> ${{ env.FEATURE_TAG || format('@{0}', matrix.client) }}</p>
      #       <p><strong>Date (UTC):</strong> ${{ github.run_started_at }}</p>
      #       <p><strong>Workflow Run:</strong> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Run</a></p>
      #       <p><strong>Artifact:</strong> playwright-report-${{ matrix.client }}-${{ matrix.environment }}-${{ github.run_id }}</p>
      #       <p><strong>Status:</strong> ${{ steps.run-tests.outputs.exit_code == '0' && 'PASSED' || 'FAILED' }}</p>
      #     attachments: |
      #       reports/email-summary.txt
      #       playwright-report/index.html

      - name: Notify MS Teams
        if: always()
        continue-on-error: true
        uses: jdcargile/ms-teams-notification@v1.3
        with:
          webhook-uri: ${{ secrets.MS_TEAMS_WEBHOOK }}
          title: "Playwright CI - ${{ matrix.client }} / ${{ matrix.environment }}"
          summary: "${{ steps.run-tests.outputs.exit_code == '0' && 'PASSED' || 'FAILED' }}"
          text: |
            Trigger: ${{ env.RUN_TRIGGER }}
            Client: ${{ matrix.client }}
            Environment: ${{ matrix.environment }}
            Feature: ${{ env.FEATURE_TAG || format('@{0}', matrix.client) }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Artifact: playwright-report-${{ matrix.client }}-${{ matrix.environment }}-${{ github.run_id }}

      - name: Fail job when tests failed
        if: steps.run-tests.outputs.exit_code != '0'
        run: exit 1
