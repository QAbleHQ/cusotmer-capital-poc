name: Playwright Automation Framework CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 2 * * *"   # Nightly run at 2 AM IST
  workflow_dispatch:
    inputs:
      client:
        description: "Client name (e.g., BOB, IDFC)"
        required: true
        default: "BOB"
      environment:
        description: "Environment (QA, UAT, PROD)"
        required: true
        default: "QA"
      feature:
        description: "Feature tag (e.g., @earn, @burn)"
        required: false

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        client: [BOB, IDFC]
        environment: [QA, UAT, PROD]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Cache Node.js dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Lint and Build Check
        run: |
          npm run lint --if-present
          npm run build --if-present

      - name: Run Playwright tests
        env:
          PROJECT: ${{ matrix.client }}-${{ matrix.environment }}
        run: |
          echo "Running Playwright tests for client=${{ matrix.client }} environment=${{ matrix.environment }}"
          npx playwright test \
            --config=playwright.config.ts \
            --grep @${{ github.event.inputs.feature || 'sanity' }} \
            --workers=1 \
            --retries=2 \
            --reporter=html

      - name: Upload Test Report
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report-${{ matrix.client }}-${{ matrix.environment }}
          path: playwright-report
          retention-days: 30

      - name: Upload Playwright Artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-artifacts-${{ matrix.client }}-${{ matrix.environment }}
          path: |
            test-results/
            playwright-report/

      - name: Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          name: playwright-failures-${{ matrix.client }}-${{ matrix.environment }}-${{ github.run_id }}
          path: test-results/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload report to S3 (optional)
        if: always() && vars.ENABLE_S3_REPORT_UPLOAD == 'true'
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_REPORT_BUCKET: ${{ secrets.S3_REPORT_BUCKET }}
        run: |
          if [ -z "$S3_REPORT_BUCKET" ]; then
            echo "S3 bucket secret not configured. Skipping S3 upload."
            exit 0
          fi

          REPORT_KEY="playwright-reports/${{ github.repository }}/${{ github.run_id }}/${{ matrix.client }}-${{ matrix.environment }}.zip"
          zip -r report.zip playwright-report reports/test-results.json reports/email-summary.txt
          aws s3 cp report.zip "s3://${S3_REPORT_BUCKET}/${REPORT_KEY}"
          echo "S3_REPORT_URL=https://${S3_REPORT_BUCKET}.s3.${AWS_REGION}.amazonaws.com/${REPORT_KEY}" >> "$GITHUB_ENV"

      - name: Send email report
        if: always()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.office365.com
          server_port: 587
          username: ankitpatel@qable.io
          password: zjwtgkflbwczqrpb
          subject: "[${{ steps.run-tests.outputs.exit_code == '0' && 'PASSED' || 'FAILED' }}] Playwright - ${{ matrix.client }} - ${{ matrix.environment }} (${{ env.RUN_TRIGGER }})"
          to: aneri.patel@qable.io, nikunj.trivedi@qable.io, 1ee687f3.linearloop.io@in.teams.ms
          from: ankitpatel@qable.io
          body: file://reports/email-summary.txt
          html_body: |
            <h2>Playwright Test Report</h2>
            <p><strong>Trigger:</strong> ${{ env.RUN_TRIGGER }}</p>
            <p><strong>Client:</strong> ${{ matrix.client }}</p>
            <p><strong>Environment:</strong> ${{ matrix.environment }}</p>
            <p><strong>Feature Tag:</strong> ${{ env.FEATURE_TAG || format('@{0}', matrix.client) }}</p>
            <p><strong>Date (UTC):</strong> ${{ github.run_started_at }}</p>
            <p><strong>Workflow Run:</strong> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Run</a></p>
            <p><strong>Artifact:</strong> playwright-report-${{ matrix.client }}-${{ matrix.environment }}-${{ github.run_id }}</p>
            <p><strong>Status:</strong> ${{ steps.run-tests.outputs.exit_code == '0' && 'PASSED' || 'FAILED' }}</p>
          attachments: |
            reports/email-summary.txt
            playwright-report/index.html

      - name: Notify MS Teams (Optional)
        if: always()
        continue-on-error: true
        env:
          STATUS: ${{ steps.run-tests.outputs.exit_code == '0' && 'PASSED' || 'FAILED' }}
          EMOJI: ${{ steps.run-tests.outputs.exit_code == '0' && '✅' || '❌' }}
        run: |
          curl -s -X POST "${{ secrets.MS_TEAMS_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"type\": \"message\",
              \"attachments\": [{
                \"contentType\": \"application/vnd.microsoft.card.adaptive\",
                \"content\": {
                  \"\$schema\": \"http://adaptivecards.io/schemas/adaptive-card.json\",
                  \"type\": \"AdaptiveCard\",
                  \"version\": \"1.4\",
                  \"body\": [
                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"${EMOJI} Playwright CI — ${{ matrix.client }} / ${{ matrix.environment }} — ${STATUS}\",
                      \"weight\": \"Bolder\",
                      \"size\": \"Medium\",
                      \"wrap\": true
                    },
                    {
                      \"type\": \"FactSet\",
                      \"facts\": [
                        { \"title\": \"Trigger\",     \"value\": \"${{ env.RUN_TRIGGER }}\" },
                        { \"title\": \"Client\",      \"value\": \"${{ matrix.client }}\" },
                        { \"title\": \"Environment\", \"value\": \"${{ matrix.environment }}\" },
                        { \"title\": \"Feature\",     \"value\": \"${{ env.FEATURE_TAG || format('@{0}', matrix.client) }}\" },
                        { \"title\": \"Artifact\",    \"value\": \"playwright-report-${{ matrix.client }}-${{ matrix.environment }}-${{ github.run_id }}\" }
                      ]
                    }
                  ],
                  \"actions\": [{
                    \"type\": \"Action.OpenUrl\",
                    \"title\": \"View Run\",
                    \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                  }]
                }
              }]
            }"

      - name: Fail job when tests failed
        if: steps.run-tests.outputs.exit_code != '0'
        run: exit 1
